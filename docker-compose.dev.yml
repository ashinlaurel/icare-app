services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:14.17.6-bullseye-slim
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: >
      sh -c "npm install && npm start -- --legacy-watch"
    ports:
      - "3000:3000"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    image: node:14.17.6-bullseye-slim
    working_dir: /app
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - backend
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      PORT: 3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: 3001
    command: >
      sh -c "npm install && npm start"
    ports:
      - "3001:3001"
    volumes:
      - ./FrontEnd:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:
